name: Digilab CI/CD Controle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-en-build:
    name: Code kwaliteit en Tests
    runs-on: ubuntu-latest

    steps:
    - name: Haal code op via Git
      uses: actions/checkout@v4

    - name: Configureer Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Installeer dependencies (NPM)
      run: npm ci

    - name: Voer Vitest Code Tests uit (Snelle check)
      run: npm run test -- --run

    - name: Installeer Playwright browsers (E2E)
      run: npx playwright install --with-deps chromium

    - name: Voer Playwright E2E Tests uit
      run: npm run test:e2e

    - name: Test of het project bouwt (Compileren voor productie)
      run: npm run build

    - name: Publiceer Test Resultaten (bij fouten)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 5
